in_source: "(defun mod2 (a b)\n    (- a (* (/ a b) b)))\n\n(defun rev (n acc)\n  \
  \  (if (= n 0)\n        acc\n        (rev (/ n 10) (+ (* acc 10) (mod2 n 10)))))\n\
  \n(defun palindrome (n)\n    (= n (rev n 0)))\n\n; Search 900..999 (Euler problem\
  \ 4: 993*913 = 906609)\n(defun check-range ()\n    (setq best 0)\n    (loop for\
  \ i from 900 to 999 do\n        (loop for j from 900 to 999 do\n            (setq\
  \ prod (* i j))\n            (if (> prod best)\n                (if (palindrome\
  \ prod)\n                    (setq best prod)\n                    (setq best best))\n\
  \                (setq best best))))\n    best)\n\n(print (check-range))\n"
